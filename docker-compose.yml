services:
  db:
    image: postgres:17-alpine
    container_name: fs-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend-go/test-data/dump.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - feedback-system-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: fs-backend-go
    image: fs-backend-go-image
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    networks:
      - feedback-system-network

  front-form:
    container_name: fs-form
    build:
      context: ./frontend-form
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - feedback-system-network

  front-table:
    container_name: fs-table
    build:
      context: ./frontend-table
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - feedback-system-network

  proxy:
    image: nginx:alpine
    container_name: fs-proxy
    ports:
      - "2510:80"
    volumes:
      - ./backend-go/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - front-form
      - front-table
    networks:
      - feedback-system-network

volumes:
  pg_data:

networks:
  feedback-system-network:
    driver: bridge
